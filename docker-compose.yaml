version: '3.9'

services:
  torsocksbag:
    build:
      args:
        PROXY_COUNT: ${PROXY_COUNT}
    env_file:
      - .env
    container_name: torsocksbag
    restart: unless-stopped
    ports:
      - "${START_PORT}-${END_PORT}:${START_PORT}-${END_PORT}"
    
    volumes:
      - ./templates/bridges.txt:/etc/tor/bridges.txt:ro
      - tor-data:/var/lib/tor

    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost ${START_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tor-data:
